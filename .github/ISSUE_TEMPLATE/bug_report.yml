name: Bug report
description: Something isn't working
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `tableverse serve data.parquet`
        2. Open the browser
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: dropdown
    id: install
    attributes:
      label: How did you install Tableverse?
      options:
        - pip install tableverse
        - Docker
        - cargo install
        - Built from source
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "0.1.0 — run `tableverse --version` or `pip show tableverse`"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14, Ubuntu 22.04, Windows 11, ..."
    validations:
      required: true

  - type: dropdown
    id: format
    attributes:
      label: Data format (if relevant)
      options:
        - Parquet
        - CSV
        - Arrow IPC
        - JSON
        - S3 / remote
        - Not applicable

  - type: input
    id: size
    attributes:
      label: Approximate dataset size (rows × columns)
      placeholder: "e.g. 50M rows × 200 cols"

  - type: textarea
    id: logs
    attributes:
      label: Logs or error output
      description: Run with `RUST_LOG=debug` for more detail.
      render: shell
